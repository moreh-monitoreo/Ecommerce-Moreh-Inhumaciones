<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión | Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-panel">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="login-brand">Moreh Inhumaciones</span>
      <span class="login-sub">Panel Administrativo</span>
    </div>

    <h2 class="login-title">Bienvenido</h2>
    <p class="login-desc">Ingresa tus credenciales para continuar</p>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input class="form-control" type="email" id="email" placeholder="admin@moreh.mx" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;" id="btn-login">
        Iniciar sesión
      </button>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:.78rem;color:var(--muted);">
      © 2025 Moreh Inhumaciones S.A. de C.V.
    </p>
  </div>
</div>

<script>
  const BASE = (window.MOREH_API ?? '') + '/api';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    btn.textContent = 'Verificando...';
    btn.disabled = true;

    try {
      const res = await fetch(BASE + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message ?? 'Credenciales inválidas');
      localStorage.setItem('moreh_token', data.data.token);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.textContent = 'Iniciar sesión';
      btn.disabled = false;
    }
  });

  // Redirect if already logged in
  if (localStorage.getItem('moreh_token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
