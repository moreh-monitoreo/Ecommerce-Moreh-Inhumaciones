<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sucursales | Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="../js/api.js"></script><script src="../js/layout.js"></script><script src="../js/auth.js"></script>
</head>
<body>
<div class="admin-main"><div class="admin-content">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div><h1 class="page-title">Sucursales</h1><p class="page-subtitle">14 sucursales en Sinaloa, Jalisco y BCS</p></div>
    <button class="btn-admin btn-primary" onclick="openModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva sucursal
    </button>
  </div>

  <div id="branch-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Cargando...</div>
  </div>
</div></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box modal-lg">
    <div class="modal-header"><h4 class="modal-title" id="modal-title">Nueva Sucursal</h4><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="field-id">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nombre *</label><input class="form-control" id="field-nombre" placeholder="Ej. Culiacán Centro"></div>
        <div class="form-group"><label class="form-label">Estado *</label><input class="form-control" id="field-estado" placeholder="Ej. Sinaloa"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ciudad *</label><input class="form-control" id="field-ciudad"></div>
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-control" id="field-telefono"></div>
      </div>
      <div class="form-group"><label class="form-label">Dirección</label><input class="form-control" id="field-direccion"></div>
      <div class="form-group"><label class="form-label">Horario</label><input class="form-control" id="field-horario" placeholder="Ej. 24 horas"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Latitud</label><input class="form-control" type="number" id="field-lat" step="0.0000001"></div>
        <div class="form-group"><label class="form-label">Longitud</label><input class="form-control" type="number" id="field-lng" step="0.0000001"></div>
      </div>
      <div class="form-group"><label class="form-label">URL imagen fachada</label><input class="form-control" id="field-imagen_url"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-admin btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn-admin btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<script>
let sucursales = [];
let editingId = null;

async function load() {
  document.getElementById('topbar-page-title').textContent = 'Sucursales';
  try {
    sucursales = await Api.get('/admin/sucursales');
    const grid = document.getElementById('branch-grid');
    if (!sucursales.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);">Sin sucursales</div>'; return; }
    const byState = {};
    sucursales.forEach(b => { if(!byState[b.estado]) byState[b.estado] = []; byState[b.estado].push(b); });
    grid.innerHTML = Object.entries(byState).map(([estado, branches]) => `
      <div style="grid-column:1/-1;">
        <div style="font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);">${estado}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">
          ${branches.map(b => `
            <div class="card" style="padding:18px 20px;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
                <div>
                  <div style="font-weight:700;font-size:.95rem;">${b.nombre}</div>
                  <div style="font-size:.78rem;color:var(--text-muted);">${b.ciudad}, ${b.estado}</div>
                </div>
                <span class="pill ${b.activo?'pill-green':'pill-gray'}">${b.activo?'Activa':'Inactiva'}</span>
              </div>
              ${b.telefono ? `<div style="font-size:.8rem;color:var(--text-muted);margin-bottom:4px;">📞 ${b.telefono}</div>` : ''}
              ${b.horario ? `<div style="font-size:.8rem;color:var(--text-muted);margin-bottom:4px;">🕐 ${b.horario}</div>` : ''}
              ${b.direccion ? `<div style="font-size:.78rem;color:var(--text-light);margin-bottom:10px;">${b.direccion}</div>` : ''}
              <div style="display:flex;gap:8px;margin-top:10px;">
                <button class="btn-admin btn-outline" style="flex:1;justify-content:center;font-size:.78rem;padding:6px 10px;" onclick="edit(${b.id})">Editar</button>
                <button class="btn-admin" style="flex:1;justify-content:center;font-size:.78rem;padding:6px 10px;background:#f1f5f9;border-color:var(--border);" onclick="manageChapels(${b.id},'${b.nombre}')">Capillas</button>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('');
  } catch(e) { document.getElementById('branch-grid').innerHTML = `<div style="color:var(--danger);padding:30px;">${e.message}</div>`; }
}

function openModal(data = null) {
  editingId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingId ? 'Editar Sucursal' : 'Nueva Sucursal';
  ['nombre','estado','ciudad','telefono','direccion','horario','imagen_url'].forEach(f => {
    const el = document.getElementById('field-'+f);
    if(el) el.value = data?.[f] ?? '';
  });
  document.getElementById('field-lat').value = data?.lat ?? '';
  document.getElementById('field-lng').value = data?.lng ?? '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function edit(id) { const b = sucursales.find(x=>x.id===id); if(b) openModal(b); }

async function save() {
  const nombre = document.getElementById('field-nombre').value.trim();
  const estado = document.getElementById('field-estado').value.trim();
  const ciudad = document.getElementById('field-ciudad').value.trim();
  if (!nombre || !estado || !ciudad) { Toast.show('Nombre, estado y ciudad son requeridos', 'warning'); return; }
  const body = {
    nombre, estado, ciudad,
    telefono: document.getElementById('field-telefono').value || null,
    direccion: document.getElementById('field-direccion').value || null,
    horario: document.getElementById('field-horario').value || null,
    lat: document.getElementById('field-lat').value || null,
    lng: document.getElementById('field-lng').value || null,
    imagen_url: document.getElementById('field-imagen_url').value || null,
  };
  try {
    if (editingId) await Api.put(`/admin/sucursales/${editingId}`, body);
    else await Api.post('/admin/sucursales', body);
    closeModal(); load(); Toast.show('Sucursal guardada', 'success');
  } catch(e) { Toast.show(e.message, 'error'); }
}

async function manageChapels(branchId, branchName) {
  const chapels = await Api.get(`/admin/sucursales/${branchId}/capillas`);
  const list = chapels.map(c => `${c.id}: ${c.nombre} (cap. ${c.capacidad ?? '—'})`).join('\n') || 'Sin capillas';
  const action = prompt(`Capillas de ${branchName}:\n${list}\n\n¿Agregar nueva? Escribe el nombre o cancela:`);
  if (action) {
    const cap = parseInt(prompt('Capacidad (dejar vacío si no aplica):'));
    try {
      await Api.post(`/admin/sucursales/${branchId}/capillas`, { nombre: action, capacidad: cap || null });
      Toast.show('Capilla agregada', 'success');
    } catch(e) { Toast.show(e.message, 'error'); }
  }
}

document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
