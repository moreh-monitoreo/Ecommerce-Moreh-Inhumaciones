<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clientes · Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/api.js"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/auth.js"></script>
  <style>
    .client-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--ink); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="admin-main">
  <div class="admin-content">

    <div class="page-h">
      <div>
        <h1 class="page-title">Clientes</h1>
        <div class="page-meta">
          <span>Registro de clientes y familias atendidas</span>
          <span class="dot"></span>
          <span><b id="meta-total">0</b> clientes</span>
          <span class="dot"></span>
          <span><b id="meta-new" style="color:var(--green);">0</b> nuevos este mes</span>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar</button>
        <button class="btn btn-primary" onclick="openModal()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo cliente</button>
      </div>
    </div>

    <div class="table-toolbar">
      <label class="search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="Buscar por nombre, email o teléfono..." />
      </label>
      <span class="chip">Con órdenes</span>
      <span class="chip">Con contratos</span>
    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th style="width:200px;">Email</th>
          <th style="width:130px;">Teléfono</th>
          <th style="width:140px;">RFC</th>
          <th style="width:80px; text-align:right;">Órdenes</th>
          <th style="width:90px; text-align:right;">Contratos</th>
          <th style="width:110px;">Registrado</th>
          <th style="width:90px; text-align:right;">Acciones</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="8" style="text-align:center; padding:40px; color:var(--muted);">Cargando...</td></tr>
      </tbody>
    </table>

  </div>
</div>

<!-- Modal cliente -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h4 class="modal-title" id="modal-title">Nuevo cliente</h4>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id" />
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-control" id="field-nombre" /></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="field-email" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-control" id="field-telefono" /></div>
        <div class="form-group"><label class="form-label">RFC</label><input class="form-control" id="field-rfc" placeholder="XAXX010101000" maxlength="13" /></div>
      </div>
      <div class="form-group"><label class="form-label">Dirección</label><textarea class="form-control" id="field-direccion" rows="2"></textarea></div>
      <div class="form-group"><label class="form-label">Notas internas</label><textarea class="form-control" id="field-notas" rows="2"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal detalle -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h4 class="modal-title" id="detail-title">Detalle del cliente</h4>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detail-body" style="min-height:200px;"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeDetail()">Cerrar</button>
    </div>
  </div>
</div>

<script>
let clientes = [];
let editingId = null;

const initials = n => (n || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || '?';
const editIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const eyeIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

async function load() {
  if (window.AdminLayout) window.AdminLayout.setPageTitle('Clientes');
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const tbody = document.getElementById('table-body');
  try {
    clientes = await Api.get('/admin/clientes');
    let filtered = search ? clientes.filter(c =>
      c.nombre?.toLowerCase().includes(search) ||
      c.email?.toLowerCase().includes(search) ||
      c.telefono?.includes(search)
    ) : clientes;

    document.getElementById('meta-total').textContent = clientes.length;
    const now = new Date(); const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    document.getElementById('meta-new').textContent = clientes.filter(c => new Date(c.createdAt).getTime() >= startOfMonth).length;

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><h3>Sin clientes</h3><p>Crea el primero con el botón "Nuevo cliente".</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(c => `
      <tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="client-avatar">${initials(c.nombre)}</div>
            <div>
              <div class="row-name">${c.nombre}</div>
              ${c.notas ? `<div class="row-sub" style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.notas}</div>` : ''}
            </div>
          </div>
        </td>
        <td style="color:var(--muted);">${c.email ?? '—'}</td>
        <td style="color:var(--muted);">${c.telefono ?? '—'}</td>
        <td><code style="font-family:var(--font-mono); font-size:11px; color:var(--muted);">${c.rfc ?? '—'}</code></td>
        <td style="text-align:right; font-variant-numeric:tabular-nums; font-weight:600;">${c._count?.orders ?? 0}</td>
        <td style="text-align:right; font-variant-numeric:tabular-nums; font-weight:600;">${c._count?.contracts ?? 0}</td>
        <td style="color:var(--muted); font-variant-numeric:tabular-nums;">${fmt.date(c.createdAt)}</td>
        <td style="text-align:right;">
          <div class="row-actions">
            <button class="icon-btn" onclick="viewDetail(${c.id})" title="Ver detalle">${eyeIcon}</button>
            <button class="icon-btn" onclick="edit(${c.id})" title="Editar">${editIcon}</button>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--red); padding:30px;">${e.message}</td></tr>`;
  }
}

async function viewDetail(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  document.getElementById('detail-title').textContent = c.nombre;
  const body = document.getElementById('detail-body');
  body.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted);">Cargando historial...</div>';
  document.getElementById('modal-detail').classList.add('open');
  try {
    const [orders, contracts] = await Promise.all([
      Api.get(`/admin/clientes/${id}/ordenes`).catch(() => []),
      Api.get(`/admin/clientes/${id}/contratos`).catch(() => []),
    ]);
    body.innerHTML = `
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:18px;">
        <div class="client-avatar" style="width:48px; height:48px; font-size:14px;">${initials(c.nombre)}</div>
        <div>
          <div style="font-size:16px; font-weight:600; letter-spacing:-0.01em;">${c.nombre}</div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;">Registrado el ${fmt.date(c.createdAt)}</div>
        </div>
      </div>
      <div class="kpi-row" style="grid-template-columns: repeat(4, 1fr); margin-bottom:16px;">
        <div class="kpi"><div class="kpi-label">Email</div><div style="font-size:13px; font-weight:500; margin-top:6px; word-break:break-all;">${c.email ?? '—'}</div></div>
        <div class="kpi"><div class="kpi-label">Teléfono</div><div style="font-size:13px; font-weight:500; margin-top:6px;">${c.telefono ?? '—'}</div></div>
        <div class="kpi"><div class="kpi-label">RFC</div><div style="font-size:13px; font-weight:500; margin-top:6px; font-family:var(--font-mono);">${c.rfc ?? '—'}</div></div>
        <div class="kpi"><div class="kpi-label">Órdenes / Contratos</div><div style="font-size:18px; font-weight:600; margin-top:6px; font-variant-numeric:tabular-nums;">${orders.length} <span style="color:var(--muted);">/ ${contracts.length}</span></div></div>
      </div>
      ${c.direccion ? `<div class="banner banner-blue" style="margin-bottom:16px;"><b>Dirección:</b> ${c.direccion}</div>` : ''}
      <div class="section-h" style="margin-bottom:8px;"><div class="section-title">Órdenes recientes</div><div class="section-sub">${orders.length} total</div></div>
      ${orders.length ? `<table class="admin-table">
        <thead><tr><th>#</th><th>Total</th><th>Estado</th><th>Fecha</th></tr></thead>
        <tbody>${orders.slice(0,5).map(o => `<tr><td><span class="row-id">#${o.id}</span></td><td style="font-variant-numeric:tabular-nums; font-weight:600;">${fmt.currency(o.total)}</td><td><span class="pill">${o.status}</span></td><td style="color:var(--muted);">${fmt.date(o.createdAt)}</td></tr>`).join('')}</tbody>
      </table>` : '<p style="color:var(--muted); font-size:12px; padding:10px 0 20px;">Sin órdenes registradas.</p>'}
      <div class="section-h" style="margin-top:18px; margin-bottom:8px;"><div class="section-title">Contratos recientes</div><div class="section-sub">${contracts.length} total</div></div>
      ${contracts.length ? `<table class="admin-table">
        <thead><tr><th>#</th><th>Tipo</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>${contracts.slice(0,5).map(x => `<tr><td><span class="row-id">#${x.id}</span></td><td>${x.tipo}</td><td style="font-variant-numeric:tabular-nums; font-weight:600;">${fmt.currency(x.total)}</td><td><span class="pill">${x.status}</span></td></tr>`).join('')}</tbody>
      </table>` : '<p style="color:var(--muted); font-size:12px;">Sin contratos registrados.</p>'}
    `;
  } catch (e) { body.innerHTML = `<p style="color:var(--red);">${e.message}</p>`; }
}

function openModal(data = null) {
  editingId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingId ? 'Editar cliente' : 'Nuevo cliente';
  document.getElementById('field-id').value = editingId ?? '';
  document.getElementById('field-nombre').value = data?.nombre ?? '';
  document.getElementById('field-email').value = data?.email ?? '';
  document.getElementById('field-telefono').value = data?.telefono ?? '';
  document.getElementById('field-rfc').value = data?.rfc ?? '';
  document.getElementById('field-direccion').value = data?.direccion ?? '';
  document.getElementById('field-notas').value = data?.notas ?? '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeDetail() { document.getElementById('modal-detail').classList.remove('open'); }
function edit(id) { const c = clientes.find(x => x.id === id); if (c) openModal(c); }

async function save() {
  const nombre = document.getElementById('field-nombre').value.trim();
  if (!nombre) { Toast.show('El nombre es requerido', 'warning'); return; }
  const body = {
    nombre,
    email: document.getElementById('field-email').value || null,
    telefono: document.getElementById('field-telefono').value || null,
    rfc: document.getElementById('field-rfc').value || null,
    direccion: document.getElementById('field-direccion').value || null,
    notas: document.getElementById('field-notas').value || null,
  };
  try {
    if (editingId) await Api.put(`/admin/clientes/${editingId}`, body);
    else await Api.post('/admin/clientes', body);
    closeModal(); load(); Toast.show('Cliente guardado', 'success');
  } catch (e) { Toast.show(e.message, 'error'); }
}

document.getElementById('search-input').addEventListener('input', load);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('modal-detail').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
