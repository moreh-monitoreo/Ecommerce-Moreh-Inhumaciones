<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuarios | Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="../js/api.js"></script><script src="../js/layout.js"></script><script src="../js/auth.js"></script>
</head>
<body>
<div class="admin-main"><div class="admin-content">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div><h1 class="page-title">Usuarios</h1><p class="page-subtitle">Cuentas del panel administrativo</p></div>
    <button class="btn-admin btn-primary" onclick="openModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo usuario
    </button>
  </div>

  <div class="toolbar">
    <div class="toolbar-search">
      <svg class="toolbar-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search-input" placeholder="Buscar usuario...">
    </div>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Sucursal</th><th>Último acceso</th><th>Estado</th><th class="actions">Acciones</th></tr></thead>
      <tbody id="table-body"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Cargando...</td></tr></tbody>
    </table>
  </div>
</div></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header"><h4 class="modal-title" id="modal-title">Nuevo Usuario</h4><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="field-id">
      <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-control" id="field-nombre"></div>
      <div class="form-group"><label class="form-label">Email *</label><input class="form-control" type="email" id="field-email"></div>
      <div class="form-group" id="group-password"><label class="form-label" id="label-password">Contraseña *</label><input class="form-control" type="password" id="field-password" placeholder="Mínimo 6 caracteres"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Rol *</label><select class="form-select" id="field-role_id"><option value="">Seleccionar...</option></select></div>
        <div class="form-group"><label class="form-label">Sucursal</label><select class="form-select" id="field-branch_id"><option value="">Global (todas)</option></select></div>
      </div>
      <div class="form-group" id="group-activo" style="display:none;"><label class="form-label">Estado</label>
        <select class="form-select" id="field-activo"><option value="true">Activo</option><option value="false">Inactivo</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-admin btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn-admin btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<script>
let usuarios = [];
let roles = [];
let sucursales = [];
let editingId = null;

async function init() {
  document.getElementById('topbar-page-title').textContent = 'Usuarios';
  [roles, sucursales] = await Promise.all([Api.get('/admin/roles'), Api.get('/sucursales')]);
  document.getElementById('field-role_id').innerHTML = '<option value="">Seleccionar...</option>' + roles.map(r => `<option value="${r.id}">${r.nombre}</option>`).join('');
  document.getElementById('field-branch_id').innerHTML = '<option value="">Global (todas)</option>' + sucursales.map(b => `<option value="${b.id}">${b.nombre} (${b.ciudad})</option>`).join('');
  load();
}

async function load() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const tbody = document.getElementById('table-body');
  try {
    usuarios = await Api.get('/admin/usuarios');
    let filtered = search ? usuarios.filter(u => u.nombre?.toLowerCase().includes(search) || u.email?.toLowerCase().includes(search)) : usuarios;
    if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Sin usuarios</td></tr>'; return; }
    const initials = n => n?.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() ?? 'U';
    tbody.innerHTML = filtered.map(u => `
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#0d1b2a,#1a2f47);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;">${initials(u.nombre)}</div>
          <div style="font-weight:600;">${u.nombre}</div>
        </div></td>
        <td style="color:var(--text-muted);">${u.email}</td>
        <td><span class="pill pill-blue">${u.role?.nombre ?? '—'}</span></td>
        <td>${u.branch?.nombre ?? <span style="color:var(--text-muted)">Global</span>}</td>
        <td style="color:var(--text-muted);font-size:.8rem;">${fmt.date(u.ultimo_acceso)}</td>
        <td><span class="pill ${u.activo?'pill-green':'pill-gray'}">${u.activo?'Activo':'Inactivo'}</span></td>
        <td class="actions">
          <button class="btn-icon" onclick="edit(${u.id})"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="btn-icon danger" onclick="deactivate(${u.id},'${u.nombre.replace(/'/g,"\\'")}')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
        </td>
      </tr>`).join('');
  } catch(e) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:30px;">${e.message}</td></tr>`; }
}

function openModal(data = null) {
  editingId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingId ? 'Editar Usuario' : 'Nuevo Usuario';
  document.getElementById('field-id').value = editingId ?? '';
  document.getElementById('field-nombre').value = data?.nombre ?? '';
  document.getElementById('field-email').value = data?.email ?? '';
  document.getElementById('field-password').value = '';
  document.getElementById('field-role_id').value = data?.role_id ?? '';
  document.getElementById('field-branch_id').value = data?.branch_id ?? '';
  document.getElementById('field-activo').value = String(data?.activo ?? true);
  document.getElementById('group-activo').style.display = editingId ? '' : 'none';
  document.getElementById('label-password').textContent = editingId ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña *';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function edit(id) { const u = usuarios.find(x=>x.id===id); if(u) openModal(u); }

async function save() {
  const nombre = document.getElementById('field-nombre').value.trim();
  const email = document.getElementById('field-email').value.trim();
  const role_id = +document.getElementById('field-role_id').value;
  const password = document.getElementById('field-password').value;
  if (!nombre || !email || !role_id) { Toast.show('Completa los campos requeridos', 'warning'); return; }
  if (!editingId && !password) { Toast.show('La contraseña es requerida', 'warning'); return; }
  const body = { nombre, email, role_id, branch_id: document.getElementById('field-branch_id').value || null, activo: document.getElementById('field-activo').value === 'true' };
  if (password) body.password = password;
  try {
    if (editingId) await Api.put(`/admin/usuarios/${editingId}`, body);
    else await Api.post('/admin/usuarios', body);
    closeModal(); load(); Toast.show(editingId ? 'Usuario actualizado' : 'Usuario creado', 'success');
  } catch(e) { Toast.show(e.message, 'error'); }
}

async function deactivate(id, nombre) {
  if (!confirm(`¿Desactivar al usuario "${nombre}"?`)) return;
  try { await Api.delete(`/admin/usuarios/${id}`); load(); Toast.show('Usuario desactivado', 'success'); }
  catch(e) { Toast.show(e.message, 'error'); }
}

document.getElementById('search-input').addEventListener('input', load);
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
