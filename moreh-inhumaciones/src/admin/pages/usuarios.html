<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuarios · Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/api.js"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/auth.js"></script>
  <style>
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--ink); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="admin-main">
  <div class="admin-content">

    <div class="page-h">
      <div>
        <h1 class="page-title">Usuarios</h1>
        <div class="page-meta">
          <span>Cuentas del panel administrativo</span>
          <span class="dot"></span>
          <span><b id="meta-total">0</b> usuarios</span>
          <span class="dot"></span>
          <span><b id="meta-active" style="color:var(--green);">0</b> activos</span>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar</button>
        <button class="btn btn-primary" onclick="openModal()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo usuario</button>
      </div>
    </div>

    <div class="table-toolbar">
      <label class="search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="Buscar usuario..." />
      </label>
      <span class="chip">Rol: <b>Todos</b></span>
      <span class="chip">Sucursal: <b>Todas</b></span>
    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Usuario</th>
          <th style="width:240px;">Email</th>
          <th style="width:140px;">Rol</th>
          <th style="width:180px;">Sucursal</th>
          <th style="width:140px;">Último acceso</th>
          <th style="width:100px;">Estado</th>
          <th style="width:90px; text-align:right;">Acciones</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--muted);">Cargando...</td></tr>
      </tbody>
    </table>

  </div>
</div>

<!-- Modal usuario -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-head">
      <h4 class="modal-title" id="modal-title">Nuevo usuario</h4>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id" />
      <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-control" id="field-nombre" /></div>
      <div class="form-group"><label class="form-label">Email *</label><input class="form-control" type="email" id="field-email" /></div>
      <div class="form-group" id="group-password">
        <label class="form-label" id="label-password">Contraseña *</label>
        <input class="form-control" type="password" id="field-password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Rol *</label>
          <select class="form-select" id="field-role_id"><option value="">Seleccionar...</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Sucursal</label>
          <select class="form-select" id="field-branch_id"><option value="">Global (todas)</option></select>
        </div>
      </div>
      <div class="form-group" id="group-activo" style="display:none;">
        <label class="form-label">Estado</label>
        <select class="form-select" id="field-activo">
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<script>
let usuarios = [];
let roles = [];
let sucursales = [];
let editingId = null;

const initials = n => (n || '').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || '?';
const editIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const trashIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>`;

async function init() {
  if (window.AdminLayout) window.AdminLayout.setPageTitle('Usuarios');
  [roles, sucursales] = await Promise.all([
    Api.get('/admin/roles').catch(() => []),
    Api.get('/sucursales').catch(() => []),
  ]);
  document.getElementById('field-role_id').innerHTML = '<option value="">Seleccionar...</option>' + roles.map(r => `<option value="${r.id}">${r.nombre}</option>`).join('');
  document.getElementById('field-branch_id').innerHTML = '<option value="">Global (todas)</option>' + sucursales.map(b => `<option value="${b.id}">${b.nombre} (${b.ciudad})</option>`).join('');
  load();
}

async function load() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const tbody = document.getElementById('table-body');
  try {
    usuarios = await Api.get('/admin/usuarios');
    let filtered = search ? usuarios.filter(u =>
      u.nombre?.toLowerCase().includes(search) ||
      u.email?.toLowerCase().includes(search)
    ) : usuarios;

    document.getElementById('meta-total').textContent = usuarios.length;
    document.getElementById('meta-active').textContent = usuarios.filter(u => u.activo).length;

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><h3>Sin usuarios</h3><p>Crea el primero con el botón "Nuevo usuario".</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(u => `
      <tr>
        <td>
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="user-avatar">${initials(u.nombre)}</div>
            <div class="row-name">${u.nombre}</div>
          </div>
        </td>
        <td style="color:var(--muted);">${u.email}</td>
        <td><span class="pill pill-blue">${u.role?.nombre ?? '—'}</span></td>
        <td>${u.branch?.nombre ?? '<span style="color:var(--light);">Global</span>'}</td>
        <td style="color:var(--muted); font-variant-numeric:tabular-nums;">${u.ultimo_acceso ? fmt.date(u.ultimo_acceso) : '<span style="color:var(--light);">Nunca</span>'}</td>
        <td>${u.activo ? '<span class="status status-ok">Activo</span>' : '<span class="status status-off">Inactivo</span>'}</td>
        <td style="text-align:right;">
          <div class="row-actions">
            <button class="icon-btn" onclick="edit(${u.id})" title="Editar">${editIcon}</button>
            <button class="icon-btn" onclick="deactivate(${u.id},'${u.nombre.replace(/'/g,"\\'")}')" title="Desactivar">${trashIcon}</button>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--red); padding:30px;">${e.message}</td></tr>`;
  }
}

function openModal(data = null) {
  editingId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingId ? 'Editar usuario' : 'Nuevo usuario';
  document.getElementById('field-id').value = editingId ?? '';
  document.getElementById('field-nombre').value = data?.nombre ?? '';
  document.getElementById('field-email').value = data?.email ?? '';
  document.getElementById('field-password').value = '';
  document.getElementById('field-role_id').value = data?.role_id ?? '';
  document.getElementById('field-branch_id').value = data?.branch_id ?? '';
  document.getElementById('field-activo').value = String(data?.activo ?? true);
  document.getElementById('group-activo').style.display = editingId ? '' : 'none';
  document.getElementById('label-password').textContent = editingId ? 'Nueva contraseña (vacío = no cambiar)' : 'Contraseña *';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function edit(id) { const u = usuarios.find(x => x.id === id); if (u) openModal(u); }

async function save() {
  const nombre = document.getElementById('field-nombre').value.trim();
  const email = document.getElementById('field-email').value.trim();
  const role_id = +document.getElementById('field-role_id').value;
  const password = document.getElementById('field-password').value;
  if (!nombre || !email || !role_id) { Toast.show('Completa los campos requeridos', 'warning'); return; }
  if (!editingId && !password) { Toast.show('La contraseña es requerida', 'warning'); return; }
  const body = {
    nombre, email, role_id,
    branch_id: document.getElementById('field-branch_id').value || null,
    activo: document.getElementById('field-activo').value === 'true',
  };
  if (password) body.password = password;
  try {
    if (editingId) await Api.put(`/admin/usuarios/${editingId}`, body);
    else await Api.post('/admin/usuarios', body);
    closeModal(); load(); Toast.show(editingId ? 'Usuario actualizado' : 'Usuario creado', 'success');
  } catch (e) { Toast.show(e.message, 'error'); }
}

async function deactivate(id, nombre) {
  if (!confirm(`¿Desactivar al usuario "${nombre}"?`)) return;
  try { await Api.delete(`/admin/usuarios/${id}`); load(); Toast.show('Usuario desactivado', 'success'); }
  catch (e) { Toast.show(e.message, 'error'); }
}

document.getElementById('search-input').addEventListener('input', load);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
