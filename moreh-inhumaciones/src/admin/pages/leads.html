<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leads · Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/api.js"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/auth.js"></script>
  <style>
    .kanban {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .kanban-col {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 10px;
      min-height: 200px;
    }
    .kanban-col-h {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.04em; text-transform: uppercase;
      padding: 4px 4px 10px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--border-soft);
    }
    .kanban-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color .12s, box-shadow .12s, transform .12s;
    }
    .kanban-card:hover {
      border-color: var(--faint);
      box-shadow: 0 4px 10px rgba(0,0,0,0.04);
      transform: translateY(-1px);
    }
    .kanban-card-name { font-size: 12.5px; font-weight: 600; color: var(--ink); }
    .kanban-card-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>

<div class="admin-main">
  <div class="admin-content">

    <div class="page-h">
      <div>
        <h1 class="page-title">Leads / CRM</h1>
        <div class="page-meta">
          <span>Prospectos y solicitudes de contacto</span>
          <span class="dot"></span>
          <span><b id="meta-total">0</b> leads</span>
          <span class="dot"></span>
          <span><b id="meta-new" style="color:var(--accent);">0</b> nuevos sin contactar</span>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar</button>
        <button class="btn btn-primary" onclick="openModal()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo lead</button>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="kanban" id="kanban">
      <div class="kanban-col">
        <div class="kanban-col-h"><span>Nuevo</span><span class="pill" id="ct-nuevo">0</span></div>
        <div id="col-nuevo"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-h"><span>Contactado</span><span class="pill pill-blue" id="ct-contactado">0</span></div>
        <div id="col-contactado"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-h"><span>Calificado</span><span class="pill pill-amber" id="ct-calificado">0</span></div>
        <div id="col-calificado"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-h"><span>Convertido</span><span class="pill pill-green" id="ct-convertido">0</span></div>
        <div id="col-convertido"></div>
      </div>
      <div class="kanban-col">
        <div class="kanban-col-h"><span>Descartado</span><span class="pill pill-red" id="ct-descartado">0</span></div>
        <div id="col-descartado"></div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="table-toolbar">
      <label class="search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="Buscar lead..." />
      </label>
      <select class="form-select" id="filter-status" style="max-width:160px; padding:5px 9px; font-size:11.5px;">
        <option value="">Todos los estados</option>
        <option value="nuevo">Nuevo</option>
        <option value="contactado">Contactado</option>
        <option value="calificado">Calificado</option>
        <option value="convertido">Convertido</option>
        <option value="descartado">Descartado</option>
      </select>
      <select class="form-select" id="filter-fuente" style="max-width:160px; padding:5px 9px; font-size:11.5px;">
        <option value="">Todas las fuentes</option>
        <option value="web">Web</option>
        <option value="telefono">Teléfono</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="referido">Referido</option>
        <option value="presencial">Presencial</option>
      </select>
    </div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Lead</th>
          <th style="width:130px;">Teléfono</th>
          <th style="width:110px;">Fuente</th>
          <th>Mensaje</th>
          <th style="width:140px;">Asignado a</th>
          <th style="width:120px;">Estado</th>
          <th style="width:110px;">Fecha</th>
          <th style="width:90px; text-align:right;">Acciones</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="8" style="text-align:center; padding:40px; color:var(--muted);">Cargando...</td></tr>
      </tbody>
    </table>

  </div>
</div>

<!-- Modal Lead -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h4 class="modal-title" id="modal-title">Nuevo lead</h4>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id" />
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nombre *</label><input class="form-control" id="field-nombre" /></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="field-email" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Teléfono</label><input class="form-control" id="field-telefono" /></div>
        <div class="form-group">
          <label class="form-label">Fuente</label>
          <select class="form-select" id="field-fuente">
            <option value="web">Web</option>
            <option value="telefono">Teléfono</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="referido">Referido</option>
            <option value="presencial">Presencial</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Mensaje / Solicitud</label>
        <textarea class="form-control" id="field-mensaje" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-select" id="field-status">
            <option value="nuevo">Nuevo</option>
            <option value="contactado">Contactado</option>
            <option value="calificado">Calificado</option>
            <option value="convertido">Convertido</option>
            <option value="descartado">Descartado</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Asignado a</label>
          <select class="form-select" id="field-assigned_to"><option value="">Sin asignar</option></select>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<script>
let leads = [];
let usuarios = [];
let editingId = null;

const STATUS_PILL = { nuevo:'', contactado:'pill-blue', calificado:'pill-amber', convertido:'pill-green', descartado:'pill-red' };
const STATUS_LABEL = { nuevo:'Nuevo', contactado:'Contactado', calificado:'Calificado', convertido:'Convertido', descartado:'Descartado' };
const FUENTE_LABEL = { web:'Web', telefono:'Teléfono', whatsapp:'WhatsApp', referido:'Referido', presencial:'Presencial' };

async function init() {
  if (window.AdminLayout) window.AdminLayout.setPageTitle('Leads / CRM');
  try { usuarios = await Api.get('/admin/usuarios'); } catch {}
  const sel = document.getElementById('field-assigned_to');
  sel.innerHTML = '<option value="">Sin asignar</option>' + usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
  load();
}

const editIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const trashIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>`;

async function load() {
  const search = (document.getElementById('search-input').value || '').toLowerCase();
  const statusFilter = document.getElementById('filter-status').value;
  const fuenteFilter = document.getElementById('filter-fuente').value;
  const tbody = document.getElementById('table-body');
  try {
    leads = await Api.get('/admin/leads');
    let filtered = leads;
    if (search) filtered = filtered.filter(l =>
      l.nombre?.toLowerCase().includes(search) ||
      l.email?.toLowerCase().includes(search) ||
      l.telefono?.includes(search));
    if (statusFilter) filtered = filtered.filter(l => l.status === statusFilter);
    if (fuenteFilter) filtered = filtered.filter(l => l.fuente === fuenteFilter);

    document.getElementById('meta-total').textContent = leads.length;
    document.getElementById('meta-new').textContent = leads.filter(l => l.status === 'nuevo').length;

    // Kanban
    ['nuevo','contactado','calificado','convertido','descartado'].forEach(s => {
      const col = document.getElementById(`col-${s}`);
      const cards = leads.filter(l => l.status === s);
      document.getElementById(`ct-${s}`).textContent = cards.length;
      col.innerHTML = cards.slice(0, 8).map(l => `
        <div class="kanban-card" onclick="edit(${l.id})">
          <div class="kanban-card-name">${l.nombre}</div>
          <div class="kanban-card-meta">${FUENTE_LABEL[l.fuente] ?? '—'} · ${fmt.date(l.createdAt)}</div>
          ${l.telefono ? `<div class="kanban-card-meta">${l.telefono}</div>` : ''}
        </div>`).join('') || `<div style="color:var(--light); font-size:11px; text-align:center; padding:12px 0;">Vacío</div>`;
    });

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><h3>Sin leads</h3><p>No hay prospectos para los filtros seleccionados.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = filtered.map(l => `
      <tr>
        <td>
          <div class="row-name">${l.nombre}</div>
          <div class="row-sub">${l.email ?? ''}</div>
        </td>
        <td style="color:var(--muted);">${l.telefono ?? '—'}</td>
        <td style="color:var(--ink-soft);">${FUENTE_LABEL[l.fuente] ?? '—'}</td>
        <td style="max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted);">${l.mensaje ?? '—'}</td>
        <td>${l.assignedTo?.nombre ?? '<span style="color:var(--light);">Sin asignar</span>'}</td>
        <td><span class="pill ${STATUS_PILL[l.status] ?? ''}">${STATUS_LABEL[l.status] ?? l.status}</span></td>
        <td style="color:var(--muted); font-variant-numeric:tabular-nums;">${fmt.date(l.createdAt)}</td>
        <td style="text-align:right;">
          <div class="row-actions">
            <button class="icon-btn" onclick="edit(${l.id})" title="Editar">${editIcon}</button>
            <button class="icon-btn" onclick="removeLead(${l.id},'${l.nombre.replace(/'/g,"\\'")}')" title="Eliminar">${trashIcon}</button>
          </div>
        </td>
      </tr>`).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--red); padding:30px;">${e.message}</td></tr>`;
  }
}

function openModal(data = null) {
  editingId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingId ? 'Editar lead' : 'Nuevo lead';
  document.getElementById('field-id').value = editingId ?? '';
  document.getElementById('field-nombre').value = data?.nombre ?? '';
  document.getElementById('field-email').value = data?.email ?? '';
  document.getElementById('field-telefono').value = data?.telefono ?? '';
  document.getElementById('field-fuente').value = data?.fuente ?? 'web';
  document.getElementById('field-mensaje').value = data?.mensaje ?? '';
  document.getElementById('field-status').value = data?.status ?? 'nuevo';
  document.getElementById('field-assigned_to').value = data?.assigned_to ?? '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function edit(id) { const l = leads.find(x => x.id === id); if (l) openModal(l); }

async function save() {
  const nombre = document.getElementById('field-nombre').value.trim();
  if (!nombre) { Toast.show('El nombre es requerido', 'warning'); return; }
  const body = {
    nombre,
    email: document.getElementById('field-email').value || null,
    telefono: document.getElementById('field-telefono').value || null,
    fuente: document.getElementById('field-fuente').value,
    mensaje: document.getElementById('field-mensaje').value || null,
    status: document.getElementById('field-status').value,
    assigned_to: document.getElementById('field-assigned_to').value || null,
  };
  try {
    if (editingId) await Api.put(`/admin/leads/${editingId}`, body);
    else await Api.post('/admin/leads', body);
    closeModal(); load(); Toast.show('Lead guardado', 'success');
  } catch (e) { Toast.show(e.message, 'error'); }
}

async function removeLead(id, nombre) {
  if (!confirm(`¿Eliminar el lead "${nombre}"?`)) return;
  try { await Api.delete(`/admin/leads/${id}`); load(); Toast.show('Lead eliminado', 'success'); }
  catch (e) { Toast.show(e.message, 'error'); }
}

document.getElementById('search-input').addEventListener('input', load);
document.getElementById('filter-status').addEventListener('change', load);
document.getElementById('filter-fuente').addEventListener('change', load);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
