<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Productos · Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/layout.js" defer></script>
</head>
<body>

<div class="admin-main">
  <div class="admin-content">

    <div class="page-h">
      <div>
        <h1 class="page-title">Productos</h1>
        <div class="page-meta">
          <span><b style="color:var(--ink);">142</b> en catálogo</span>
          <span class="dot"></span>
          <span><b style="color:var(--green);">134</b> activos</span>
          <span class="dot"></span>
          <span><b style="color:var(--amber);">8</b> stock bajo</span>
          <span class="dot"></span>
          <span><b style="color:var(--red);">3</b> agotados</span>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar
        </button>
        <button class="btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Importar
        </button>
        <button class="btn btn-primary" id="btn-new">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nuevo producto
        </button>
      </div>
    </div>

    <!-- ── Toolbar de filtros ─────────────────────────── -->
    <div class="table-toolbar">
      <label class="search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="filter-q" placeholder="Buscar por nombre, SKU..." />
      </label>
      <span class="chip" data-filter="cat">Categoría: <b id="lbl-cat">Todas</b>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
      <span class="chip" data-filter="status">Estado: <b id="lbl-status">Todos</b>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
      <span class="chip" data-filter="mat">Material: <b id="lbl-mat">Todos</b>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
      <span class="chip" data-filter="stock">Stock: <b id="lbl-stock">Cualquiera</b>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
      <span class="chip dashed">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Añadir filtro
      </span>
      <div style="margin-left:auto; display:flex; align-items:center; gap:8px;">
        <span style="font-size:11.5px; color:var(--muted);" id="lbl-count">10 de 142</span>
        <div class="seg">
          <button class="on">Tabla</button>
          <button>Grilla</button>
          <button>Kanban</button>
        </div>
      </div>
    </div>

    <!-- ── Tabla ──────────────────────────────────────── -->
    <table class="admin-table">
      <thead>
        <tr>
          <th style="width:28px;"><input type="checkbox" id="chk-all" /></th>
          <th style="width:60px;">ID</th>
          <th class="sortable">Producto</th>
          <th style="width:90px;">Categoría</th>
          <th style="width:90px; text-align:right;" class="sortable">Precio</th>
          <th style="width:90px;">Material</th>
          <th style="width:80px; text-align:right;" class="sortable">Stock</th>
          <th style="width:140px;">Sucursales</th>
          <th style="width:110px;">Estado</th>
          <th style="width:90px; text-align:right;">Acciones</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="table-foot">
      <span id="foot-summary">Mostrando 1 — 10 de 142</span>
      <div class="pagination">
        <button class="btn btn-ghost" style="padding:3px 8px; font-size:11.5px;">← Anterior</button>
        <button class="btn" style="padding:3px 7px; font-size:11.5px;">1</button>
        <button class="btn btn-ghost" style="padding:3px 7px; font-size:11.5px;">2</button>
        <button class="btn btn-ghost" style="padding:3px 7px; font-size:11.5px;">3</button>
        <span style="color:var(--light); padding:0 2px;">…</span>
        <button class="btn btn-ghost" style="padding:3px 7px; font-size:11.5px;">15</button>
        <button class="btn btn-ghost" style="padding:3px 8px; font-size:11.5px;">Siguiente →</button>
      </div>
    </div>

  </div>
</div>

<!-- ── Modal: Nuevo producto ─────────────────────────── -->
<div class="modal-overlay" id="modal">
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h4 class="modal-title" id="modal-title">Nuevo producto</h4>
      <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input class="form-control" type="text" placeholder="Ej. Ataúd Metálico Cobre" />
        </div>
        <div class="form-group">
          <label class="form-label">Categoría *</label>
          <select class="form-select">
            <option>Ataúd</option>
            <option>Urna</option>
          </select>
        </div>
      </div>
      <div class="form-row cols-3">
        <div class="form-group">
          <label class="form-label">Precio (MXN) *</label>
          <input class="form-control" type="number" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label class="form-label">Material</label>
          <input class="form-control" type="text" placeholder="Metálico, Madera..." />
        </div>
        <div class="form-group">
          <label class="form-label">Stock inicial</label>
          <input class="form-control" type="number" placeholder="0" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" rows="3" placeholder="Descripción del producto..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">URL de imagen</label>
        <input class="form-control" type="text" placeholder="/img/producto.webp" />
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary">Guardar producto</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   MOCK DATA
   ========================================================= */
const PRODUCTS = [
  { id:1042, img:'cobre',   name:'Ataúd Metálico Cobre',     cat:'Ataúd', price:'$ 12,000', stock:14, mat:'Metálico',  status:'active',   branches:4 },
  { id:1041, img:'onyx',    name:'Urna Mármol Onyx',         cat:'Urna',  price:'$  4,000', stock: 6, mat:'Mármol',    status:'active',   branches:3 },
  { id:1040, img:'roble',   name:'Ataúd Roble Clásico',      cat:'Ataúd', price:'$ 13,500', stock:22, mat:'Madera',    status:'active',   branches:4 },
  { id:1039, img:'bronce',  name:'Urna Bronce Premium',      cat:'Urna',  price:'$  6,000', stock:11, mat:'Bronce',    status:'active',   branches:4 },
  { id:1038, img:'caoba',   name:'Ataúd Caoba Sello',        cat:'Ataúd', price:'$ 15,000', stock: 3, mat:'Madera',    status:'low',      branches:2 },
  { id:1037, img:'cristal', name:'Urna Cristal Tallado',     cat:'Urna',  price:'$  3,500', stock: 9, mat:'Cristal',   status:'active',   branches:3 },
  { id:1036, img:'pino',    name:'Ataúd Pino Económico',     cat:'Ataúd', price:'$  6,500', stock:28, mat:'Madera',    status:'active',   branches:4 },
  { id:1035, img:'mini',    name:'Urna Pequeña Memorial',    cat:'Urna',  price:'$  1,800', stock: 0, mat:'Cerámica',  status:'out',      branches:0 },
  { id:1034, img:'lujo',    name:'Ataúd Lujo Plata Tallada', cat:'Ataúd', price:'$ 22,000', stock: 4, mat:'Metálico',  status:'active',   branches:2 },
  { id:1033, img:'biod',    name:'Urna Biodegradable',       cat:'Urna',  price:'$  2,400', stock:17, mat:'Vegetal',   status:'inactive', branches:3 },
];

/* =========================================================
   RENDER
   ========================================================= */
function statusEl(s) {
  switch (s) {
    case 'active':   return '<span class="status status-ok">Activo</span>';
    case 'low':      return '<span class="status status-low">Stock bajo</span>';
    case 'out':      return '<span class="status status-out">Agotado</span>';
    case 'inactive': return '<span class="status status-off">Inactivo</span>';
  }
  return '';
}

function avatarStack(branches) {
  if (branches === 0) {
    return `<span class="avatar-stack-text" style="margin-left:0;">Ninguna</span>`;
  }
  const colors = ['#0a0a0a','#27272a','#71717a','#a1a1aa'];
  const dots = colors.slice(0, branches).map(c =>
    `<span style="background:${c};"></span>`
  ).join('');
  const label = branches === 1 ? '1 sucursal' : branches + ' sucursales';
  return `<span class="avatar-stack">${dots}<span class="avatar-stack-text">${label}</span></span>`;
}

function rowHTML(p) {
  const stockColor =
    p.stock === 0 ? 'var(--red)' :
    p.stock < 5   ? 'var(--amber)' :
    'var(--ink)';

  const eyeIcon  = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const editIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  const dotsIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>`;

  return `
    <tr>
      <td><input type="checkbox" /></td>
      <td><span class="row-id">#${p.id}</span></td>
      <td>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="product-thumb t-${p.img}"></div>
          <div>
            <div class="row-name">${p.name}</div>
            <div class="row-sub">SKU MRH-${p.id}</div>
          </div>
        </div>
      </td>
      <td><span class="pill pill-${p.cat === 'Ataúd' ? 'blue' : 'gold'}">${p.cat}</span></td>
      <td style="text-align:right; font-variant-numeric:tabular-nums; font-weight:600;">${p.price}</td>
      <td style="color:var(--muted);">${p.mat}</td>
      <td style="text-align:right; font-variant-numeric:tabular-nums; font-weight:500; color:${stockColor};">${p.stock}</td>
      <td>${avatarStack(p.branches)}</td>
      <td>${statusEl(p.status)}</td>
      <td class="actions">
        <div class="row-actions">
          <button class="icon-btn" title="Ver">${eyeIcon}</button>
          <button class="icon-btn" title="Editar" onclick="openModal('Editar producto')">${editIcon}</button>
          <button class="icon-btn" title="Más">${dotsIcon}</button>
        </div>
      </td>
    </tr>`;
}

function render() {
  const q = (document.getElementById('filter-q').value || '').toLowerCase();
  const rows = PRODUCTS.filter(p =>
    !q ||
    p.name.toLowerCase().includes(q) ||
    p.mat.toLowerCase().includes(q) ||
    String(p.id).includes(q)
  );
  document.getElementById('tbody').innerHTML = rows.length
    ? rows.map(rowHTML).join('')
    : `<tr><td colspan="10">
         <div class="empty-state">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
           <h3>Sin resultados</h3>
           <p>Prueba con otros términos de búsqueda o limpia los filtros.</p>
         </div>
       </td></tr>`;
  document.getElementById('foot-summary').textContent = `Mostrando 1 — ${rows.length} de 142`;
  document.getElementById('lbl-count').textContent = `${rows.length} de 142`;
}

/* =========================================================
   MODAL HELPERS
   ========================================================= */
function openModal(title) {
  if (title) document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.AdminLayout) window.AdminLayout.setPageTitle('Productos');
  render();
  document.getElementById('filter-q').addEventListener('input', render);
  document.getElementById('btn-new').addEventListener('click', () => openModal('Nuevo producto'));
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  // Select-all checkbox
  const chkAll = document.getElementById('chk-all');
  chkAll.addEventListener('change', () => {
    document.querySelectorAll('#tbody input[type="checkbox"]').forEach(c => { c.checked = chkAll.checked; });
  });
});
</script>
</body>
</html>
