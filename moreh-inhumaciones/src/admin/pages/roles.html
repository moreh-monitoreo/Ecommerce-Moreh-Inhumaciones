<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roles y permisos · Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/api.js"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/auth.js"></script>
  <style>
    .role-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .role-tab {
      padding: 6px 12px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px; font-weight: 500;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
    }
    .role-tab:hover { background: var(--surface-alt); border-color: var(--faint); }
    .role-tab.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .role-tab-add {
      border-style: dashed;
      color: var(--muted);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .perm-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .perm-table thead th {
      text-align: left; font-weight: 500; color: var(--muted);
      font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-alt);
    }
    .perm-table thead th.center { text-align: center; }
    .perm-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-soft);
    }
    .perm-table tbody tr:last-child td { border-bottom: 0; }
    .perm-module {
      font-weight: 600; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .perm-module svg { color: var(--muted); }
    .perm-check {
      width: 16px; height: 16px;
      accent-color: var(--ink);
      cursor: pointer;
    }
    .perm-row-check { text-align: center; }
  </style>
</head>
<body>

<div class="admin-main">
  <div class="admin-content">

    <div class="page-h">
      <div>
        <h1 class="page-title">Roles y permisos</h1>
        <div class="page-meta">
          <span>Matriz de acceso por módulo y acción</span>
          <span class="dot"></span>
          <span><b id="meta-roles">0</b> roles definidos</span>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn" id="btn-edit-role" style="display:none;">Editar rol</button>
        <button class="btn btn-primary" id="btn-save-perms" style="display:none;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Guardar permisos</button>
        <button class="btn btn-primary" onclick="openModal()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo rol</button>
      </div>
    </div>

    <!-- Role tabs -->
    <div class="role-tabs" id="role-tabs"></div>

    <!-- Permission matrix -->
    <div class="card">
      <div class="card-h">
        <div>
          <div class="card-title" id="matrix-role-name">Selecciona un rol</div>
          <div class="card-sub" id="matrix-role-desc">—</div>
        </div>
        <div style="font-size:11px; color:var(--muted);" id="matrix-count">—</div>
      </div>
      <div style="overflow-x:auto;">
        <table class="perm-table" id="perm-table">
          <thead><tr id="perm-head"></tr></thead>
          <tbody id="perm-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Modal rol -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-head">
      <h4 class="modal-title" id="modal-title">Nuevo rol</h4>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id" />
      <div class="form-group">
        <label class="form-label">Nombre del rol *</label>
        <input class="form-control" id="field-nombre" placeholder="Ej. Gerente de Sucursal" />
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" id="field-descripcion" rows="3" placeholder="Describe las responsabilidades de este rol..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRole()">Guardar</button>
    </div>
  </div>
</div>

<script>
const MODULES = [
  { key:'dashboard',   label:'Dashboard' },
  { key:'productos',   label:'Productos' },
  { key:'categorias',  label:'Categorías' },
  { key:'inventario',  label:'Inventario' },
  { key:'ordenes',     label:'Órdenes' },
  { key:'contratos',   label:'Contratos' },
  { key:'clientes',    label:'Clientes' },
  { key:'leads',       label:'Leads / CRM' },
  { key:'sucursales',  label:'Sucursales' },
  { key:'usuarios',    label:'Usuarios' },
  { key:'roles',       label:'Roles' },
  { key:'cms',         label:'CMS' },
  { key:'reportes',    label:'Reportes' },
  { key:'auditoria',   label:'Auditoría' },
];
const ACTIONS = ['ver','crear','editar','eliminar'];
const ACTION_LABEL = { ver:'Ver', crear:'Crear', editar:'Editar', eliminar:'Eliminar' };

let roles = [];
let allPermissions = [];
let selectedRoleId = null;
let rolePermissions = new Set();
let editingRoleId = null;

async function init() {
  if (window.AdminLayout) window.AdminLayout.setPageTitle('Roles y permisos');
  try {
    [roles, allPermissions] = await Promise.all([
      Api.get('/admin/roles'),
      Api.get('/admin/roles/permisos'),
    ]);
  } catch (e) { Toast.show(e.message, 'error'); return; }
  document.getElementById('meta-roles').textContent = roles.length;
  renderRoleTabs();
  buildPermTable();
  if (roles.length) selectRole(roles[0].id);
}

function renderRoleTabs() {
  const tabs = document.getElementById('role-tabs');
  tabs.innerHTML = roles.map(r => `
    <button class="role-tab ${r.id === selectedRoleId ? 'active' : ''}" onclick="selectRole(${r.id})">${r.nombre}</button>
  `).join('') + `<button class="role-tab role-tab-add" onclick="openModal()">+ Nuevo rol</button>`;
}

function buildPermTable() {
  const head = document.getElementById('perm-head');
  head.innerHTML = '<th style="min-width:200px;">Módulo</th>' +
    ACTIONS.map(a => `<th class="center" style="width:100px;">${ACTION_LABEL[a]}</th>`).join('');

  const body = document.getElementById('perm-body');
  body.innerHTML = MODULES.map(m => `
    <tr>
      <td><div class="perm-module"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>${m.label}</div></td>
      ${ACTIONS.map(a => {
        const perm = allPermissions.find(p => p.modulo === m.key && p.accion === a);
        return `<td class="perm-row-check">${perm
          ? `<input type="checkbox" class="perm-check" data-perm-id="${perm.id}" onchange="togglePerm(${perm.id}, this.checked)">`
          : '<span style="color:var(--light);">—</span>'}</td>`;
      }).join('')}
    </tr>`).join('');
}

async function selectRole(id) {
  selectedRoleId = id;
  renderRoleTabs();
  const role = roles.find(r => r.id === id);
  document.getElementById('matrix-role-name').textContent = role?.nombre ?? '';
  document.getElementById('matrix-role-desc').textContent = role?.descripcion || 'Sin descripción';
  document.getElementById('btn-edit-role').style.display = '';
  document.getElementById('btn-save-perms').style.display = '';

  try {
    const perms = await Api.get(`/admin/roles/${id}/permisos`);
    rolePermissions = new Set(perms.map(p => p.id));
    document.querySelectorAll('.perm-check').forEach(cb => {
      cb.checked = rolePermissions.has(+cb.dataset.permId);
    });
    document.getElementById('matrix-count').textContent = `${rolePermissions.size} permisos asignados`;
  } catch (e) { Toast.show(e.message, 'error'); }
}

function togglePerm(permId, checked) {
  if (checked) rolePermissions.add(permId);
  else rolePermissions.delete(permId);
  document.getElementById('matrix-count').textContent = `${rolePermissions.size} permisos asignados`;
}

async function savePermissions() {
  if (!selectedRoleId) return;
  try {
    await Api.put(`/admin/roles/${selectedRoleId}/permisos`, { permission_ids: [...rolePermissions] });
    Toast.show('Permisos guardados', 'success');
  } catch (e) { Toast.show(e.message, 'error'); }
}

function openModal(data = null) {
  editingRoleId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingRoleId ? 'Editar rol' : 'Nuevo rol';
  document.getElementById('field-id').value = editingRoleId ?? '';
  document.getElementById('field-nombre').value = data?.nombre ?? '';
  document.getElementById('field-descripcion').value = data?.descripcion ?? '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function editRole() { const r = roles.find(x => x.id === selectedRoleId); if (r) openModal(r); }

async function saveRole() {
  const nombre = document.getElementById('field-nombre').value.trim();
  if (!nombre) { Toast.show('El nombre del rol es requerido', 'warning'); return; }
  const body = { nombre, descripcion: document.getElementById('field-descripcion').value || null };
  try {
    if (editingRoleId) await Api.put(`/admin/roles/${editingRoleId}`, body);
    else await Api.post('/admin/roles', body);
    closeModal();
    roles = await Api.get('/admin/roles');
    document.getElementById('meta-roles').textContent = roles.length;
    renderRoleTabs();
    Toast.show('Rol guardado', 'success');
  } catch (e) { Toast.show(e.message, 'error'); }
}

document.getElementById('btn-save-perms').addEventListener('click', savePermissions);
document.getElementById('btn-edit-role').addEventListener('click', editRole);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
