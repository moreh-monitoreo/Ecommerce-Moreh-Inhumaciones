<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auditoría | Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="../js/api.js"></script><script src="../js/layout.js"></script><script src="../js/auth.js"></script>
</head>
<body>
<div class="admin-main"><div class="admin-content">
  <div style="margin-bottom:24px;">
    <h1 class="page-title">Bitácora de Auditoría</h1>
    <p class="page-subtitle">Registro inmutable de todas las acciones en el sistema</p>
  </div>

  <!-- Filtros -->
  <div class="toolbar" style="flex-wrap:wrap;gap:10px;">
    <div class="toolbar-search">
      <svg class="toolbar-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search-input" placeholder="Buscar por usuario, entidad o acción...">
    </div>
    <select class="form-select" id="filter-entidad" style="max-width:180px;">
      <option value="">Todas las entidades</option>
      <option value="Producto">Producto</option>
      <option value="Order">Orden</option>
      <option value="ServiceContract">Contrato</option>
      <option value="User">Usuario</option>
      <option value="Branch">Sucursal</option>
      <option value="Inventory">Inventario</option>
      <option value="Lead">Lead</option>
      <option value="Banner">Banner</option>
      <option value="Role">Rol</option>
      <option value="Customer">Cliente</option>
    </select>
    <select class="form-select" id="filter-accion" style="max-width:180px;">
      <option value="">Todas las acciones</option>
      <option value="CREATE">Crear</option>
      <option value="UPDATE">Actualizar</option>
      <option value="DELETE">Eliminar</option>
      <option value="LOGIN">Login</option>
    </select>
    <input type="date" class="form-control" id="filter-desde" style="max-width:160px;">
    <input type="date" class="form-control" id="filter-hasta" style="max-width:160px;">
    <button class="btn-admin btn-outline" onclick="load()">Filtrar</button>
  </div>

  <!-- Stats rápidas -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;" id="audit-stats"></div>

  <!-- Tabla de logs -->
  <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>Cuando</th><th>Usuario</th><th>Acción</th><th>Entidad</th><th>ID</th><th>IP</th><th class="actions" style="width:40px;"></th></tr></thead>
      <tbody id="table-body"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Cargando...</td></tr></tbody>
    </table>
  </div>

  <!-- Paginación -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;" id="pagination-bar">
    <div style="font-size:.82rem;color:var(--text-muted);" id="pagination-info"></div>
    <div style="display:flex;gap:6px;">
      <button class="btn-admin btn-outline" id="btn-prev" style="padding:6px 14px;font-size:.82rem;" onclick="changePage(-1)">← Anterior</button>
      <button class="btn-admin btn-outline" id="btn-next" style="padding:6px 14px;font-size:.82rem;" onclick="changePage(1)">Siguiente →</button>
    </div>
  </div>
</div></div>

<!-- Modal detalle de cambio -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <h4 class="modal-title">Detalle del cambio</h4>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detail-content" style="min-height:200px;"></div>
    <div class="modal-footer">
      <button class="btn-admin btn-outline" onclick="closeDetail()">Cerrar</button>
    </div>
  </div>
</div>

<style>
.accion-pill { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.04em; }
.accion-CREATE { background:#dcfce7;color:#15803d; }
.accion-UPDATE { background:#dbeafe;color:#1d4ed8; }
.accion-DELETE { background:#fee2e2;color:#b91c1c; }
.accion-LOGIN  { background:#f3e8ff;color:#7c3aed; }
.diff-table { width:100%;border-collapse:collapse;font-size:.82rem; }
.diff-table th { background:#f1f5f9;padding:8px 12px;text-align:left;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted); }
.diff-table td { padding:8px 12px;border-bottom:1px solid var(--border);font-family:monospace;vertical-align:top; }
.diff-table tr:last-child td { border-bottom:none; }
.diff-before { color:#b91c1c;background:#fff5f5; }
.diff-after  { color:#15803d;background:#f0fdf4; }
.diff-unchanged { color:var(--text-muted); }
</style>

<script>
let logs = [];
let page = 1;
let totalPages = 1;
const PER_PAGE = 50;

const ACCION_LABEL = { CREATE:'Crear', UPDATE:'Actualizar', DELETE:'Eliminar', LOGIN:'Login' };

async function load() {
  document.getElementById('topbar-page-title').textContent = 'Auditoría';
  const search = document.getElementById('search-input').value;
  const entidad = document.getElementById('filter-entidad').value;
  const accion = document.getElementById('filter-accion').value;
  const desde = document.getElementById('filter-desde').value;
  const hasta = document.getElementById('filter-hasta').value;
  const tbody = document.getElementById('table-body');

  let qs = `page=${page}&per_page=${PER_PAGE}`;
  if (entidad) qs += `&entidad=${entidad}`;
  if (accion) qs += `&accion=${accion}`;
  if (desde) qs += `&desde=${desde}`;
  if (hasta) qs += `&hasta=${hasta}`;
  if (search) qs += `&q=${encodeURIComponent(search)}`;

  try {
    const result = await Api.get(`/admin/auditoria?${qs}`);
    logs = result.data ?? result;
    const total = result.total ?? logs.length;
    totalPages = Math.ceil(total / PER_PAGE);

    document.getElementById('pagination-info').textContent = `Mostrando ${logs.length} de ${total} registros · Página ${page}/${totalPages}`;
    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = page >= totalPages;

    if (!logs.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Sin registros en la bitácora</td></tr>'; return; }

    tbody.innerHTML = logs.map(l => `
      <tr>
        <td style="white-space:nowrap;font-size:.78rem;color:var(--text-muted);">${fmt.dateTime ? fmt.dateTime(l.createdAt) : fmt.date(l.createdAt)}</td>
        <td>
          <div style="font-weight:600;font-size:.85rem;">${l.user_email ?? '—'}</div>
        </td>
        <td><span class="accion-pill accion-${l.accion}">${ACCION_LABEL[l.accion] ?? l.accion}</span></td>
        <td style="font-weight:600;font-size:.85rem;">${l.entidad ?? '—'}</td>
        <td style="color:var(--text-muted);font-size:.8rem;">${l.entidad_id ?? '—'}</td>
        <td style="font-size:.75rem;color:var(--text-muted);font-family:monospace;">${l.ip ?? '—'}</td>
        <td class="actions">
          ${(l.antes || l.despues) ? `<button class="btn-icon" title="Ver cambios" onclick="viewDiff(${l.id})"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>` : ''}
        </td>
      </tr>`).join('');

    loadStats();
  } catch(e) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:30px;">${e.message}</td></tr>`; }
}

async function loadStats() {
  try {
    const stats = await Api.get('/admin/auditoria/stats');
    const container = document.getElementById('audit-stats');
    container.innerHTML = Object.entries(stats).map(([key, val]) => `
      <div class="kpi-card">
        <div class="kpi-info">
          <div class="kpi-label">${ACCION_LABEL[key] ?? key}</div>
          <div class="kpi-value" style="font-size:1.4rem;">${val}</div>
        </div>
      </div>`).join('');
  } catch {}
}

function changePage(delta) {
  page = Math.max(1, Math.min(totalPages, page + delta));
  load();
}

function viewDiff(id) {
  const log = logs.find(l => l.id === id);
  if (!log) return;
  const content = document.getElementById('detail-content');

  let antes = {};
  let despues = {};
  try { antes = JSON.parse(log.antes ?? '{}'); } catch {}
  try { despues = JSON.parse(log.despues ?? '{}'); } catch {}

  const allKeys = new Set([...Object.keys(antes), ...Object.keys(despues)]);
  const rows = [...allKeys].filter(k => antes[k] !== despues[k] || !log.antes || !log.despues).map(k => {
    const changed = log.antes && log.despues && JSON.stringify(antes[k]) !== JSON.stringify(despues[k]);
    return `<tr>
      <td style="font-weight:700;color:var(--text);">${k}</td>
      <td class="${changed && log.antes ? 'diff-before' : 'diff-unchanged'}">${log.antes ? JSON.stringify(antes[k] ?? null) : '—'}</td>
      <td class="${changed && log.despues ? 'diff-after' : 'diff-unchanged'}">${log.despues ? JSON.stringify(despues[k] ?? null) : '—'}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;font-size:.82rem;">
      <div><strong>Usuario:</strong> ${log.user_email ?? '—'}</div>
      <div><strong>Acción:</strong> <span class="accion-pill accion-${log.accion}">${ACCION_LABEL[log.accion] ?? log.accion}</span></div>
      <div><strong>Entidad:</strong> ${log.entidad} #${log.entidad_id ?? '—'}</div>
      <div><strong>IP:</strong> <code>${log.ip ?? '—'}</code></div>
      <div><strong>Fecha:</strong> ${fmt.date(log.createdAt)}</div>
      <div><strong>User-Agent:</strong> <span style="color:var(--text-muted);font-size:.75rem;">${log.user_agent?.substring(0,60) ?? '—'}...</span></div>
    </div>
    ${rows ? `
    <table class="diff-table">
      <thead><tr><th>Campo</th><th>Antes</th><th>Después</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>` : '<p style="color:var(--text-muted);font-size:.85rem;">No hay datos de cambios registrados para esta acción.</p>'}
  `;
  document.getElementById('modal-detail').classList.add('open');
}

function closeDetail() { document.getElementById('modal-detail').classList.remove('open'); }

document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') { page=1; load(); } });
document.getElementById('modal-detail').addEventListener('click', e => { if(e.target===e.currentTarget) closeDetail(); });
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const desde = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('filter-desde').value = desde.toISOString().slice(0,10);
  document.getElementById('filter-hasta').value = today.toISOString().slice(0,10);
  load();
});
</script>
</body>
</html>
