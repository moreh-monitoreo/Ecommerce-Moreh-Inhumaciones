<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auditoría · Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <script src="../js/api.js"></script>
  <script src="../js/layout.js" defer></script>
  <script src="../js/auth.js"></script>
  <style>
    .accion-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 7px; border-radius: 3px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    }
    .accion-CREATE { background: var(--green-bg); color: var(--green); }
    .accion-UPDATE { background: var(--blue-bg);  color: var(--blue); }
    .accion-DELETE { background: var(--red-bg);   color: var(--red); }
    .accion-LOGIN  { background: var(--purple-bg);color: var(--purple); }
    .diff-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .diff-table th {
      background: var(--surface-alt);
      padding: 8px 12px; text-align: left;
      font-size: 10.5px; font-weight: 500;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .diff-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-soft);
      font-family: var(--font-mono);
      font-size: 11px;
      vertical-align: top;
      word-break: break-all;
    }
    .diff-before { color: var(--red); background: var(--red-bg); }
    .diff-after  { color: var(--green); background: var(--green-bg); }
    .diff-unchanged { color: var(--muted); }
  </style>
</head>
<body>

<div class="admin-main">
  <div class="admin-content">

    <div class="page-h">
      <div>
        <h1 class="page-title">Bitácora de auditoría</h1>
        <div class="page-meta">
          <span>Registro inmutable de todas las acciones del sistema</span>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="btn"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar CSV</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="kpi-row" id="audit-stats" style="margin-bottom: 18px;">
      <div class="kpi"><div class="kpi-label">Crear</div><div class="kpi-val" id="stat-CREATE">—</div></div>
      <div class="kpi"><div class="kpi-label">Actualizar</div><div class="kpi-val" id="stat-UPDATE">—</div></div>
      <div class="kpi"><div class="kpi-label">Eliminar</div><div class="kpi-val" id="stat-DELETE">—</div></div>
      <div class="kpi"><div class="kpi-label">Login</div><div class="kpi-val" id="stat-LOGIN">—</div></div>
      <div class="kpi"><div class="kpi-label">Total eventos</div><div class="kpi-val" id="stat-total">—</div></div>
      <div class="kpi"><div class="kpi-label">Usuarios activos</div><div class="kpi-val" id="stat-users">—</div></div>
    </div>

    <!-- Filtros -->
    <div class="table-toolbar">
      <label class="search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" placeholder="Buscar por usuario, entidad o acción..." />
      </label>
      <select class="form-select" id="filter-entidad" style="max-width:180px; padding:5px 9px; font-size:11.5px;">
        <option value="">Todas las entidades</option>
        <option value="Producto">Producto</option>
        <option value="Order">Orden</option>
        <option value="ServiceContract">Contrato</option>
        <option value="User">Usuario</option>
        <option value="Branch">Sucursal</option>
        <option value="Inventory">Inventario</option>
        <option value="Lead">Lead</option>
        <option value="Banner">Banner</option>
        <option value="Role">Rol</option>
        <option value="Customer">Cliente</option>
      </select>
      <select class="form-select" id="filter-accion" style="max-width:160px; padding:5px 9px; font-size:11.5px;">
        <option value="">Todas las acciones</option>
        <option value="CREATE">Crear</option>
        <option value="UPDATE">Actualizar</option>
        <option value="DELETE">Eliminar</option>
        <option value="LOGIN">Login</option>
      </select>
      <input type="date" class="form-control" id="filter-desde" style="max-width:140px; padding:5px 9px; font-size:11.5px;" />
      <input type="date" class="form-control" id="filter-hasta" style="max-width:140px; padding:5px 9px; font-size:11.5px;" />
      <button class="btn" onclick="page=1; load();">Filtrar</button>
    </div>

    <!-- Tabla -->
    <table class="admin-table">
      <thead>
        <tr>
          <th style="width:160px;">Cuándo</th>
          <th>Usuario</th>
          <th style="width:110px;">Acción</th>
          <th style="width:150px;">Entidad</th>
          <th style="width:90px;">ID</th>
          <th style="width:130px;">IP</th>
          <th style="width:40px; text-align:right;"></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--muted);">Cargando...</td></tr>
      </tbody>
    </table>

    <div class="table-foot">
      <span id="pagination-info">—</span>
      <div class="pagination">
        <button class="btn btn-ghost" id="btn-prev" style="padding:3px 8px; font-size:11.5px;" onclick="changePage(-1)">← Anterior</button>
        <button class="btn btn-ghost" id="btn-next" style="padding:3px 8px; font-size:11.5px;" onclick="changePage(1)">Siguiente →</button>
      </div>
    </div>

  </div>
</div>

<!-- Modal detalle -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h4 class="modal-title">Detalle del cambio</h4>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detail-content" style="min-height:200px;"></div>
    <div class="modal-foot">
      <button class="btn" onclick="closeDetail()">Cerrar</button>
    </div>
  </div>
</div>

<script>
let logs = [];
let page = 1;
let totalPages = 1;
const PER_PAGE = 50;
const ACCION_LABEL = { CREATE:'Crear', UPDATE:'Actualizar', DELETE:'Eliminar', LOGIN:'Login' };

const eyeIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

async function load() {
  if (window.AdminLayout) window.AdminLayout.setPageTitle('Auditoría');
  const search = document.getElementById('search-input').value;
  const entidad = document.getElementById('filter-entidad').value;
  const accion = document.getElementById('filter-accion').value;
  const desde = document.getElementById('filter-desde').value;
  const hasta = document.getElementById('filter-hasta').value;
  const tbody = document.getElementById('table-body');

  let qs = `page=${page}&per_page=${PER_PAGE}`;
  if (entidad) qs += `&entidad=${entidad}`;
  if (accion) qs += `&accion=${accion}`;
  if (desde) qs += `&desde=${desde}`;
  if (hasta) qs += `&hasta=${hasta}`;
  if (search) qs += `&q=${encodeURIComponent(search)}`;

  try {
    const result = await Api.get(`/admin/auditoria?${qs}`);
    logs = result.data ?? result;
    const total = result.total ?? logs.length;
    totalPages = Math.max(1, Math.ceil(total / PER_PAGE));

    document.getElementById('pagination-info').textContent =
      `Mostrando ${logs.length} de ${total} eventos · Página ${page} de ${totalPages}`;
    document.getElementById('btn-prev').disabled = page <= 1;
    document.getElementById('btn-next').disabled = page >= totalPages;

    if (!logs.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><h3>Sin eventos</h3><p>No hay registros para los filtros seleccionados.</p></div></td></tr>`;
      return;
    }

    tbody.innerHTML = logs.map(l => `
      <tr>
        <td style="color:var(--muted); font-variant-numeric:tabular-nums; font-size:11.5px;">${fmt.dateTime ? fmt.dateTime(l.createdAt) : fmt.date(l.createdAt)}</td>
        <td><div class="row-name" style="font-size:12.5px;">${l.user_email ?? '—'}</div></td>
        <td><span class="accion-pill accion-${l.accion}">${ACCION_LABEL[l.accion] ?? l.accion}</span></td>
        <td style="font-weight:500;">${l.entidad ?? '—'}</td>
        <td style="color:var(--muted); font-variant-numeric:tabular-nums;">${l.entidad_id ?? '—'}</td>
        <td><code style="font-family:var(--font-mono); font-size:11px; color:var(--muted);">${l.ip ?? '—'}</code></td>
        <td style="text-align:right;">
          ${(l.antes || l.despues) ? `<button class="icon-btn" onclick="viewDiff(${l.id})" title="Ver cambios">${eyeIcon}</button>` : ''}
        </td>
      </tr>`).join('');

    loadStats();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--red); padding:30px;">${e.message}</td></tr>`;
  }
}

async function loadStats() {
  try {
    const stats = await Api.get('/admin/auditoria/stats');
    ['CREATE','UPDATE','DELETE','LOGIN'].forEach(k => {
      const el = document.getElementById(`stat-${k}`);
      if (el) el.textContent = stats[k] ?? '0';
    });
    const el = document.getElementById('stat-total');
    if (el) el.textContent = Object.values(stats).reduce((a, b) => Number(a) + Number(b), 0);
    if (document.getElementById('stat-users')) {
      document.getElementById('stat-users').textContent = stats.usuarios_activos ?? '—';
    }
  } catch {}
}

function changePage(delta) {
  page = Math.max(1, Math.min(totalPages, page + delta));
  load();
}

function viewDiff(id) {
  const log = logs.find(l => l.id === id);
  if (!log) return;
  let antes = {}, despues = {};
  try { antes = JSON.parse(log.antes ?? '{}'); } catch {}
  try { despues = JSON.parse(log.despues ?? '{}'); } catch {}

  const allKeys = new Set([...Object.keys(antes), ...Object.keys(despues)]);
  const rows = [...allKeys].filter(k => antes[k] !== despues[k] || !log.antes || !log.despues).map(k => {
    const changed = log.antes && log.despues && JSON.stringify(antes[k]) !== JSON.stringify(despues[k]);
    return `<tr>
      <td style="font-family:var(--font); font-weight:600; color:var(--ink);">${k}</td>
      <td class="${changed && log.antes ? 'diff-before' : 'diff-unchanged'}">${log.antes ? JSON.stringify(antes[k] ?? null) : '—'}</td>
      <td class="${changed && log.despues ? 'diff-after' : 'diff-unchanged'}">${log.despues ? JSON.stringify(despues[k] ?? null) : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="kpi-row" style="grid-template-columns: repeat(3, 1fr); margin-bottom:16px;">
      <div class="kpi">
        <div class="kpi-label">Acción</div>
        <div style="margin-top:6px;"><span class="accion-pill accion-${log.accion}">${ACCION_LABEL[log.accion] ?? log.accion}</span></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Entidad</div>
        <div style="font-size:13px; font-weight:600; margin-top:6px;">${log.entidad} #${log.entidad_id ?? '—'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Usuario</div>
        <div style="font-size:13px; font-weight:600; margin-top:6px;">${log.user_email ?? '—'}</div>
      </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; font-size:11.5px; color:var(--muted);">
      <div><b style="color:var(--ink);">Fecha:</b> ${fmt.date(log.createdAt)}</div>
      <div><b style="color:var(--ink);">IP:</b> <code style="font-family:var(--font-mono); font-size:11px;">${log.ip ?? '—'}</code></div>
      <div style="grid-column:1/-1; overflow:hidden; text-overflow:ellipsis;"><b style="color:var(--ink);">User-Agent:</b> <span style="font-family:var(--font-mono); font-size:11px;">${(log.user_agent ?? '—').substring(0, 100)}</span></div>
    </div>
    ${rows ? `
      <div class="section-title" style="margin-bottom:8px;">Cambios</div>
      <table class="diff-table">
        <thead><tr><th style="width:30%;">Campo</th><th style="width:35%;">Antes</th><th style="width:35%;">Después</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    ` : '<p style="color:var(--muted); font-size:12px;">No hay datos de cambios registrados para esta acción.</p>'}
  `;
  document.getElementById('modal-detail').classList.add('open');
}

function closeDetail() { document.getElementById('modal-detail').classList.remove('open'); }

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { page = 1; load(); }
});
document.getElementById('filter-entidad').addEventListener('change', () => { page = 1; load(); });
document.getElementById('filter-accion').addEventListener('change', () => { page = 1; load(); });
document.getElementById('modal-detail').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const desde = new Date(today.getFullYear(), today.getMonth(), 1);
  document.getElementById('filter-desde').value = desde.toISOString().slice(0,10);
  document.getElementById('filter-hasta').value = today.toISOString().slice(0,10);
  load();
});
</script>
</body>
</html>
