<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categorías | Moreh Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="../js/api.js"></script><script src="../js/layout.js"></script><script src="../js/auth.js"></script>
</head>
<body>
<div class="admin-main"><div class="admin-content">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div><h1 class="page-title">Categorías</h1><p class="page-subtitle">Organización jerárquica de productos</p></div>
    <button class="btn-admin btn-primary" onclick="openModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva categoría
    </button>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead><tr><th>Nombre</th><th>Slug</th><th>Categoría padre</th><th>Productos</th><th>Estado</th><th class="actions">Acciones</th></tr></thead>
      <tbody id="table-body"><tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Cargando...</td></tr></tbody>
    </table>
  </div>
</div></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header"><h4 class="modal-title" id="modal-title">Nueva Categoría</h4><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="field-id">
      <div class="form-group"><label class="form-label">Nombre *</label><input class="form-control" id="field-nombre" placeholder="Ej. Ataúdes de madera"></div>
      <div class="form-group"><label class="form-label">Slug *</label><input class="form-control" id="field-slug" placeholder="Ej. ataud-madera"></div>
      <div class="form-group"><label class="form-label">Categoría padre</label>
        <select class="form-select" id="field-parent_id"><option value="">Ninguna (categoría raíz)</option></select>
      </div>
      <div class="form-group" id="group-activo" style="display:none;"><label class="form-label">Estado</label>
        <select class="form-select" id="field-activo"><option value="true">Activa</option><option value="false">Inactiva</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-admin btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn-admin btn-primary" onclick="save()">Guardar</button>
    </div>
  </div>
</div>

<script>
let categorias = [];
let editingId = null;

function toSlug(str) {
  return str.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

async function load() {
  document.getElementById('topbar-page-title').textContent = 'Categorías';
  const tbody = document.getElementById('table-body');
  try {
    categorias = await Api.get('/admin/categorias');
    if (!categorias.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Sin categorías</td></tr>'; return; }
    const catMap = {};
    categorias.forEach(c => catMap[c.id] = c.nombre);
    tbody.innerHTML = categorias.map(c => `
      <tr>
        <td><div style="display:flex;align-items:center;gap:8px;">
          ${c.parent_id ? '<span style="color:var(--text-muted);font-size:1rem;">↳</span>' : '<span style="width:16px;display:inline-block;"></span>'}
          <span style="font-weight:600;">${c.nombre}</span>
        </div></td>
        <td style="color:var(--text-muted);font-size:.82rem;font-family:monospace;">${c.slug}</td>
        <td>${c.parent_id ? `<span class="pill pill-blue">${catMap[c.parent_id] ?? '#'+c.parent_id}</span>` : '<span style="color:var(--text-muted);">—</span>'}</td>
        <td style="color:var(--text-muted);">${c._count?.productos ?? '—'}</td>
        <td><span class="pill ${c.activo?'pill-green':'pill-gray'}">${c.activo?'Activa':'Inactiva'}</span></td>
        <td class="actions">
          <button class="btn-icon" onclick="edit(${c.id})"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="btn-icon danger" onclick="remove(${c.id},'${c.nombre.replace(/'/g,"\\'")}')"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
        </td>
      </tr>`).join('');
  } catch(e) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--danger);padding:30px;">${e.message}</td></tr>`; }
}

function populateParentSelect(excludeId = null) {
  const sel = document.getElementById('field-parent_id');
  const roots = categorias.filter(c => !c.parent_id && c.id !== excludeId);
  sel.innerHTML = '<option value="">Ninguna (categoría raíz)</option>' + roots.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
}

function openModal(data = null) {
  editingId = data?.id ?? null;
  document.getElementById('modal-title').textContent = editingId ? 'Editar Categoría' : 'Nueva Categoría';
  document.getElementById('field-id').value = editingId ?? '';
  document.getElementById('field-nombre').value = data?.nombre ?? '';
  document.getElementById('field-slug').value = data?.slug ?? '';
  document.getElementById('field-activo').value = String(data?.activo ?? true);
  document.getElementById('group-activo').style.display = editingId ? '' : 'none';
  populateParentSelect(editingId);
  document.getElementById('field-parent_id').value = data?.parent_id ?? '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function edit(id) { const c = categorias.find(x => x.id === id); if(c) openModal(c); }

document.getElementById('field-nombre').addEventListener('input', e => {
  if (!editingId) document.getElementById('field-slug').value = toSlug(e.target.value);
});

async function save() {
  const nombre = document.getElementById('field-nombre').value.trim();
  const slug = document.getElementById('field-slug').value.trim();
  if (!nombre || !slug) { Toast.show('Nombre y slug son requeridos', 'warning'); return; }
  const body = {
    nombre, slug,
    parent_id: document.getElementById('field-parent_id').value || null,
    activo: document.getElementById('field-activo').value === 'true',
  };
  try {
    if (editingId) await Api.put(`/admin/categorias/${editingId}`, body);
    else await Api.post('/admin/categorias', body);
    closeModal(); load(); Toast.show('Categoría guardada', 'success');
  } catch(e) { Toast.show(e.message, 'error'); }
}

async function remove(id, nombre) {
  if (!confirm(`¿Eliminar la categoría "${nombre}"? Esta acción no se puede deshacer.`)) return;
  try { await Api.delete(`/admin/categorias/${id}`); load(); Toast.show('Categoría eliminada', 'success'); }
  catch(e) { Toast.show(e.message, 'error'); }
}

document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
